<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Reparti - PlateTimer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf0 100%); min-height: 100vh; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .page-header { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .page-title { font-size: 22px; font-weight: 600; color: #1a1a2e; margin: 0; }
        .plan-badge { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f0f0f0; color: #444; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: white; }
        .btn-danger:hover:not(:disabled) { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-title { font-size: 16px; font-weight: 600; color: #333; margin: 0 0 16px 0; }
        .create-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
        .form-label { font-size: 13px; font-weight: 500; color: #555; }
        .form-input { padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #667eea; }
        .dept-list { display: flex; flex-direction: column; gap: 10px; }
        .dept-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid #eee; border-radius: 10px; background: #fafafa; flex-wrap: wrap; }
        .dept-item.inactive { opacity: 0.65; }
        .dept-name { font-size: 15px; font-weight: 600; color: #333; flex: 1; min-width: 120px; }
        .status-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
        .status-active { background: #d4edda; color: #155724; }
        .status-inactive { background: #f8d7da; color: #721c24; }
        .used-badge { font-size: 11px; color: #888; background: #f0f0f0; padding: 3px 8px; border-radius: 10px; }
        .limit-bar { background: #f0f0f0; border-radius: 8px; height: 8px; margin-top: 8px; overflow: hidden; }
        .limit-bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: width 0.4s; }
        .empty-state { text-align: center; padding: 40px 20px; color: #888; font-size: 15px; }
        .back-btn { position: absolute; top: 20px; right: 20px; }
        #error-msg, #success-msg { display: none; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-top: 10px; }
        #error-msg { background: #ffeaea; color: #c0392b; border: 1px solid #f5c6cb; }
        #success-msg { background: #eafaf1; color: #196f3d; border: 1px solid #b7e4c7; }
    </style>
</head>
<body>
    <button class="btn btn-secondary back-btn" onclick="window.location.href='home.html'">Torna alla Home</button>

    <div class="page-header">
        <div>
            <p class="page-title">Gestione Reparti</p>
            <p id="company-label" style="margin:4px 0 0; font-size:13px; color:#888;"></p>
        </div>
        <div>
            <span id="plan-badge" class="plan-badge">Piano: ...</span>
        </div>
    </div>

    <div class="card">
        <p class="card-title">Utilizzo Reparti</p>
        <p id="usage-text" style="font-size:14px; color:#555; margin:0 0 8px;">Caricamento...</p>
        <div class="limit-bar"><div id="limit-bar-fill" class="limit-bar-fill" style="width:0%"></div></div>
    </div>

    <div class="card">
        <p class="card-title">Crea Nuovo Reparto</p>
        <div class="create-form">
            <div class="form-group">
                <label class="form-label">Nome Reparto</label>
                <input id="dept-name-input" class="form-input" type="text" placeholder="es. Cucina, Bar, Pasticceria..." maxlength="40">
            </div>
            <button id="create-btn" class="btn btn-primary" onclick="createDepartment()">Crea Reparto</button>
        </div>
        <div id="error-msg"></div>
        <div id="success-msg"></div>
    </div>

    <div class="card">
        <p class="card-title">Reparti Configurati</p>
        <div id="dept-list" class="dept-list">
            <div class="empty-state">Caricamento...</div>
        </div>
    </div>

    <script src="js/ws-auth.js"></script>
    <script>
        const token = WsAuth.getStoredToken();
        if (!token) {
            alert('Sessione scaduta. Effettua nuovamente il login.');
            window.location.href = 'index.html';
        }

        const companyName = localStorage.getItem('userCompany') || '';
        document.getElementById('company-label').textContent = companyName;

        let departments = [];
        let planLimit = 3;
        let planName = 'base';

        async function apiFetch(path, opts = {}) {
            const res = await fetch(path, {
                ...opts,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
            });
            return res.json();
        }

        async function loadDepartments() {
            const data = await apiFetch('/api/departments');
            if (!data.success) { showError(data.error || 'Errore nel caricamento.'); return; }
            departments = data.departments || [];
            planName = data.plan || 'base';
            planLimit = data.limit || 3;
            renderAll();
        }

        function renderAll() {
            const active = departments.filter(d => d.active).length;
            const total = departments.length;
            const planLabels = { base: 'Base (max 3)', medium: 'Medium (max 5)', premium: 'Premium (max 10)' };
            document.getElementById('plan-badge').textContent = 'Piano: ' + (planLabels[planName] || planName);
            document.getElementById('usage-text').textContent = `${active} attivi su ${planLimit} consentiti (${total} totali)`;
            const pct = planLimit > 0 ? Math.min(100, Math.round((active / planLimit) * 100)) : 0;
            document.getElementById('limit-bar-fill').style.width = pct + '%';
            document.getElementById('limit-bar-fill').style.background = pct >= 100
                ? 'linear-gradient(135deg,#ff6b6b,#ee5a24)'
                : 'linear-gradient(135deg,#667eea,#764ba2)';

            const list = document.getElementById('dept-list');
            if (departments.length === 0) {
                list.innerHTML = '<div class="empty-state">Nessun reparto configurato. Crea il primo reparto sopra.</div>';
                return;
            }

            list.innerHTML = departments.map(d => `
                <div class="dept-item ${d.active ? '' : 'inactive'}">
                    <span class="dept-name">${escHtml(d.name)}</span>
                    <span class="status-badge ${d.active ? 'status-active' : 'status-inactive'}">${d.active ? 'Attivo' : 'Inattivo'}</span>
                    ${d.usedInCountdowns ? '<span class="used-badge">Usato in countdown</span>' : ''}
                    <div style="display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;">
                        <button class="btn btn-secondary" style="padding:6px 14px;font-size:13px;"
                            onclick="toggleDept('${d.id}', ${!d.active})">${d.active ? 'Disattiva' : 'Attiva'}</button>
                        <button class="btn btn-danger" style="padding:6px 14px;font-size:13px;"
                            onclick="deleteDept('${d.id}')"
                            ${d.usedInCountdowns ? 'disabled title="Usato in countdown — disattivare invece"' : ''}>Elimina</button>
                    </div>
                </div>
            `).join('');
        }

        async function createDepartment() {
            const name = document.getElementById('dept-name-input').value.trim();
            if (!name) { showError('Inserisci un nome per il reparto.'); return; }
            clearMessages();
            const btn = document.getElementById('create-btn');
            btn.disabled = true;
            btn.textContent = 'Creazione...';

            const data = await apiFetch('/api/departments', { method: 'POST', body: JSON.stringify({ name }) });
            btn.disabled = false;
            btn.textContent = 'Crea Reparto';

            if (data.success) {
                document.getElementById('dept-name-input').value = '';
                showSuccess(`Reparto "${data.department.name}" creato.`);
                await loadDepartments();
            } else {
                showError(data.error || 'Errore nella creazione.');
            }
        }

        async function toggleDept(id, newActive) {
            clearMessages();
            const data = await apiFetch(`/api/departments/${id}`, { method: 'PUT', body: JSON.stringify({ active: newActive }) });
            if (data.success) { await loadDepartments(); }
            else { showError(data.error || 'Errore.'); }
        }

        async function deleteDept(id) {
            if (!confirm('Eliminare definitivamente questo reparto?')) return;
            clearMessages();
            const data = await apiFetch(`/api/departments/${id}`, { method: 'DELETE' });
            if (data.success) { showSuccess('Reparto eliminato.'); await loadDepartments(); }
            else { showError(data.error || 'Errore.'); }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }
        function clearMessages() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }
        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        document.getElementById('dept-name-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') createDepartment();
        });

        loadDepartments();
    </script>
</body>
</html>
