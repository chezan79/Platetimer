<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Reparti — PlateTimer</title>
<style>
:root {
  --bg:       #F1F5F9;
  --panel:    #FFFFFF;
  --card:     #FFFFFF;
  --card-h:   #F8FAFC;
  --border:   #E2E8F0;
  --border-l: #CBD5E1;
  --text:     #0F172A;
  --muted:    #64748B;
  --accent:   #4F46E5;
  --accent2:  #6366F1;
  --warn:     #D97706;
  --danger:   #DC2626;
  --ok:       #16A34A;
  --hdr:      56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── HEADER ─────────────────────────────── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:rgba(13,13,26,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 16px;z-index:200;}
.hdr-brand{font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.hdr-sep{width:1px;height:20px;background:var(--border-l);flex-shrink:0;}
.hdr-page{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;flex:1;}
.hdr-btn{padding:7px 14px;border:1px solid var(--border-l);border-radius:7px;
  background:rgba(255,255,255,.06);color:var(--text);font-size:13px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:background .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.12);}
.hdr-btn.danger{border-color:rgba(239,68,68,.3);color:var(--danger);}
.hdr-btn.danger:hover{background:rgba(239,68,68,.1);}

/* ── MAIN CONTAINER ─────────────────────── */
.main{max-width:1200px;margin:0 auto;padding:calc(var(--hdr) + 28px) 20px 40px;}

/* ── PAGE HEADING ───────────────────────── */
.pg-heading{margin-bottom:28px;}
.pg-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px;}
.pg-sub{font-size:14px;color:var(--muted);margin-bottom:12px;}
.plan-badge{display:inline-flex;align-items:center;gap:6px;
  background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);
  color:var(--accent2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;}

/* ── SUMMARY ROW ────────────────────────── */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:700px){.summary-row{grid-template-columns:1fr;}}

/* ── CARD ───────────────────────────────── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:22px;}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin-bottom:16px;}

/* ── USAGE CARD ─────────────────────────── */
.usage-count{font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.usage-sub{font-size:13px;color:var(--muted);margin-top:4px;margin-bottom:14px;}
.limit-bar{background:rgba(255,255,255,.07);border-radius:8px;height:8px;overflow:hidden;}
.limit-bar-fill{height:100%;border-radius:8px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}
.limit-bar-fill.at-limit{background:linear-gradient(90deg,var(--danger),#f97316);}
.usage-msg{font-size:13px;font-weight:600;margin-top:10px;}
.usage-msg.ok{color:var(--ok);}
.usage-msg.warn{color:var(--danger);}

/* ── CREATE CARD ────────────────────────── */
.form-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:11px 14px;
  background:rgba(255,255,255,.05);border:1.5px solid var(--border-l);
  border-radius:9px;color:var(--text);font-size:14px;outline:none;
  transition:border-color .15s;margin-bottom:10px;}
.form-input::placeholder{color:var(--muted);}
.form-input:focus{border-color:var(--accent);}
.form-input:disabled{opacity:.4;cursor:not-allowed;}
.limit-notice{font-size:13px;color:var(--danger);margin-bottom:10px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:10px 12px;line-height:1.5;}

/* ── BUTTONS ────────────────────────────── */
.btn{padding:10px 18px;border:none;border-radius:9px;cursor:pointer;
  font-size:14px;font-weight:600;transition:all .15s;white-space:nowrap;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none !important;}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;width:100%;}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(99,102,241,.35);}
.btn-sm{padding:7px 14px;font-size:13px;}
.btn-neutral{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border-l);}
.btn-neutral:hover:not(:disabled){background:rgba(255,255,255,.13);}
.btn-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover:not(:disabled){background:rgba(239,68,68,.22);}
.btn-danger:disabled{opacity:.25;cursor:not-allowed;}

/* ── FEEDBACK MESSAGES ──────────────────── */
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;}
.msg-error{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.25);}
.msg-success{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.25);}

/* ── DEPT SECTION ───────────────────────── */
.section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;}
.dept-list{display:flex;flex-direction:column;gap:10px;}
.dept-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  transition:border-color .15s;}
.dept-item:hover{border-color:var(--border-l);}
.dept-item.inactive{opacity:.55;}
.dept-meta{flex:1;min-width:140px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dept-name{font-size:15px;font-weight:700;color:var(--text);}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-active{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.25);}
.badge-inactive{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-used{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border-l);}
.dept-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.delete-tip{font-size:11px;color:var(--muted);align-self:center;white-space:nowrap;}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted);font-size:15px;}

/* ── LIGHT THEME OVERRIDES ─────────────────────────────── */
.hdr{background:rgba(255,255,255,.97);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.hdr-btn{background:rgba(0,0,0,.04);color:var(--text);border-color:var(--border-l);}
.hdr-btn:hover{background:rgba(0,0,0,.09);}
.hdr-btn.danger{border-color:rgba(220,38,38,.35);color:var(--danger);}
.hdr-btn.danger:hover{background:rgba(220,38,38,.08);}
/* Form inputs (was rgba(255,255,255,.05) — invisible on white) */
.form-input{background:white;color:var(--text);}
.form-input::placeholder{color:var(--muted);}
/* Usage progress bar track */
.limit-bar{background:rgba(0,0,0,.07);}
/* Neutral button on light bg */
.btn-neutral{background:rgba(0,0,0,.04);color:var(--text);border-color:var(--border-l);}
.btn-neutral:hover:not(:disabled){background:rgba(0,0,0,.08);}
/* Feedback messages adjusted for light bg */
.msg-error{color:var(--danger);background:rgba(220,38,38,.07);border-color:rgba(220,38,38,.2);}
.msg-success{color:var(--ok);background:rgba(22,163,74,.07);border-color:rgba(22,163,74,.2);}
/* Badge colours on white */
.badge-inactive{color:var(--danger);background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.15);}
.badge-used{background:rgba(0,0,0,.05);color:var(--muted);border-color:var(--border);}
/* Plan badge */
.plan-badge{background:rgba(79,70,229,.08);border-color:rgba(79,70,229,.25);color:var(--accent);}
</style>
</head>
<body>

<!-- ── HEADER ────────────────────────────── -->
<header class="hdr">
  <span id="hdr-company" class="hdr-brand"></span>
  <span class="hdr-sep"></span>
  <span class="hdr-page">Gestione Reparti</span>
  <button class="hdr-btn" onclick="window.location.href='home.html'">Home</button>
  <button class="hdr-btn danger" onclick="logout()">Esci</button>
</header>

<!-- ── MAIN ──────────────────────────────── -->
<main class="main">

  <!-- Page heading -->
  <div class="pg-heading">
    <h1 class="pg-title">Gestione Reparti</h1>
    <p id="pg-company" class="pg-sub"></p>
    <span id="plan-badge" class="plan-badge">Piano: …</span>
  </div>

  <!-- Summary row -->
  <div class="summary-row">

    <!-- Usage card -->
    <div class="card">
      <p class="card-title">Utilizzo Reparti</p>
      <div id="usage-count" class="usage-count">—</div>
      <div id="usage-sub" class="usage-sub">Caricamento…</div>
      <div class="limit-bar"><div id="limit-bar-fill" class="limit-bar-fill" style="width:0%"></div></div>
      <div id="usage-msg" class="usage-msg"></div>
    </div>

    <!-- Create card -->
    <div class="card">
      <p class="card-title">Crea Nuovo Reparto</p>
      <div id="limit-notice" class="limit-notice" style="display:none;"></div>
      <label class="form-label" for="dept-name-input">Nome reparto</label>
      <input id="dept-name-input" class="form-input" type="text"
             placeholder="es. Cucina, Bar, Pasticceria…" maxlength="40">
      <button id="create-btn" class="btn btn-primary" onclick="createDepartment()">Crea reparto</button>
      <div id="error-msg" class="msg msg-error"></div>
      <div id="success-msg" class="msg msg-success"></div>
    </div>

  </div>

  <!-- Departments list -->
  <p class="section-title">Reparti configurati</p>
  <div id="dept-list" class="dept-list">
    <div class="empty-state">Caricamento…</div>
  </div>

</main>

<script src="js/ws-auth.js"></script>
<script>
    const token = WsAuth.getStoredToken();
    if (!token) {
        alert('Sessione scaduta. Effettua nuovamente il login.');
        window.location.href = 'index.html';
    }

    const companyName = localStorage.getItem('userCompany') || '';
    document.getElementById('hdr-company').textContent = companyName;
    document.getElementById('pg-company').textContent = companyName;

    let departments = [];
    let planLimit = 3;
    let planName = 'base';

    function logout() {
        if (typeof WsAuth !== 'undefined' && WsAuth.clearToken) WsAuth.clearToken();
        window.location.href = 'index.html';
    }

    async function apiFetch(path, opts = {}) {
        const res = await fetch(path, {
            ...opts,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
        });
        return res.json();
    }

    async function loadDepartments() {
        const data = await apiFetch('/api/departments');
        if (!data.success) { showError(data.error || 'Errore nel caricamento.'); return; }
        departments = data.departments || [];
        planName = data.plan || 'base';
        planLimit = data.limit || 3;
        renderAll();
    }

    function renderAll() {
        const active = departments.filter(d => d.active).length;
        const total  = departments.length;
        const atLimit = active >= planLimit;

        const planLabels = { base: 'Base', medium: 'Medium', premium: 'Premium' };
        const planMaxLabels = { base: 3, medium: 5, premium: 10 };
        document.getElementById('plan-badge').textContent =
            `Piano: ${planLabels[planName] || planName} — massimo ${planLimit} reparti`;

        document.getElementById('usage-count').textContent = `${active} / ${planLimit}`;
        document.getElementById('usage-sub').textContent =
            `${active} reparti attivi su ${planLimit} consentiti (${total} totali)`;

        const pct = planLimit > 0 ? Math.min(100, Math.round((active / planLimit) * 100)) : 0;
        const fill = document.getElementById('limit-bar-fill');
        fill.style.width = pct + '%';
        fill.classList.toggle('at-limit', atLimit);

        const usageMsg = document.getElementById('usage-msg');
        if (atLimit) {
            usageMsg.textContent = 'Limite del piano raggiunto';
            usageMsg.className = 'usage-msg warn';
        } else {
            usageMsg.textContent = `${planLimit - active} slot disponibili`;
            usageMsg.className = 'usage-msg ok';
        }

        const limitNotice = document.getElementById('limit-notice');
        const input = document.getElementById('dept-name-input');
        const createBtn = document.getElementById('create-btn');
        if (atLimit) {
            limitNotice.textContent =
                `Hai raggiunto il limite di ${planLimit} reparti attivi previsto dal piano ${planLabels[planName] || planName}. Disattiva un reparto esistente per crearne uno nuovo.`;
            limitNotice.style.display = 'block';
            input.disabled = true;
            createBtn.disabled = true;
        } else {
            limitNotice.style.display = 'none';
            input.disabled = false;
            createBtn.disabled = false;
        }

        const list = document.getElementById('dept-list');
        if (departments.length === 0) {
            list.innerHTML = '<div class="empty-state">Nessun reparto configurato.<br>Crea il primo reparto qui sopra.</div>';
            return;
        }

        list.innerHTML = departments.map(d => {
            const canDelete = !d.usedInCountdowns;
            return `
            <div class="dept-item ${d.active ? '' : 'inactive'}">
              <div class="dept-meta">
                <span class="dept-name">${escHtml(d.name)}</span>
                <span class="badge ${d.active ? 'badge-active' : 'badge-inactive'}">${d.active ? 'Attivo' : 'Inattivo'}</span>
                ${d.usedInCountdowns ? '<span class="badge badge-used">Usato nei countdown</span>' : ''}
              </div>
              <div class="dept-actions">
                <button class="btn btn-sm btn-neutral"
                    onclick="toggleDept('${d.id}', ${!d.active})">${d.active ? 'Disattiva' : 'Attiva'}</button>
                ${canDelete
                    ? `<button class="btn btn-sm btn-danger"
                           onclick="deleteDept('${d.id}')">Elimina</button>`
                    : `<button class="btn btn-sm btn-danger" disabled
                           title="Non eliminabile: reparto già utilizzato nei countdown">Elimina</button>`
                }
              </div>
            </div>`;
        }).join('');
    }

    async function createDepartment() {
        const name = document.getElementById('dept-name-input').value.trim();
        if (!name) { showError('Inserisci un nome per il reparto.'); return; }
        clearMessages();
        const btn = document.getElementById('create-btn');
        btn.disabled = true;
        btn.textContent = 'Creazione…';

        const data = await apiFetch('/api/departments', { method: 'POST', body: JSON.stringify({ name }) });
        btn.disabled = false;
        btn.textContent = 'Crea reparto';

        if (data.success) {
            document.getElementById('dept-name-input').value = '';
            showSuccess(`Reparto "${data.department.name}" creato.`);
            await loadDepartments();
        } else {
            showError(data.error || 'Errore nella creazione.');
        }
    }

    async function toggleDept(id, newActive) {
        clearMessages();
        const data = await apiFetch(`/api/departments/${id}`, { method: 'PUT', body: JSON.stringify({ active: newActive }) });
        if (data.success) { await loadDepartments(); }
        else { showError(data.error || 'Errore.'); }
    }

    async function deleteDept(id) {
        if (!confirm('Eliminare definitivamente questo reparto?')) return;
        clearMessages();
        const data = await apiFetch(`/api/departments/${id}`, { method: 'DELETE' });
        if (data.success) { showSuccess('Reparto eliminato.'); await loadDepartments(); }
        else { showError(data.error || 'Errore.'); }
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('success-msg').style.display = 'none';
    }
    function showSuccess(msg) {
        const el = document.getElementById('success-msg');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';
    }
    function clearMessages() {
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('success-msg').style.display = 'none';
    }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    document.getElementById('dept-name-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') createDepartment();
    });

    loadDepartments();
</script>
</body>
</html>
