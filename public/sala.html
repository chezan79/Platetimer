<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servizio — PlateTimer</title>
<style>
:root {
  --bg:       #0d0d1a;
  --panel:    #12122a;
  --card:     #1a1a35;
  --card-h:   #1f1f40;
  --border:   rgba(255,255,255,0.07);
  --border-l: rgba(255,255,255,0.13);
  --text:     #e2e2f0;
  --muted:    rgba(255,255,255,0.35);
  --accent:   #6366f1;
  --accent2:  #818cf8;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --ok:       #22c55e;
  --hdr:      56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── HEADER ─────────────────────────────── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:rgba(13,13,26,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 16px;z-index:200;}
.hdr-brand{font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.hdr-sep{width:1px;height:20px;background:var(--border-l);flex-shrink:0;}
.hdr-page{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;flex:1;}
.conn-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3);
  white-space:nowrap;flex-shrink:0;transition:all .3s;}
.conn-badge.ok{background:rgba(34,197,94,.12);color:var(--ok);border-color:rgba(34,197,94,.3);}
.hdr-btn{padding:7px 14px;border:1px solid var(--border-l);border-radius:7px;
  background:rgba(255,255,255,.06);color:var(--text);font-size:13px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:background .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.12);}
.hdr-btn.danger{border-color:rgba(239,68,68,.3);color:var(--danger);}
.hdr-btn.danger:hover{background:rgba(239,68,68,.1);}

/* ── MAIN ───────────────────────────────── */
.main{max-width:1200px;margin:0 auto;padding:calc(var(--hdr) + 20px) 16px 40px;}

/* ── STATS ROW ──────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats-row{grid-template-columns:1fr;}}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:16px 18px;text-align:center;}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:800;color:var(--accent2);line-height:1;}

/* ── FILTERS ────────────────────────────── */
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.search-input{flex:1;min-width:180px;padding:9px 14px;
  background:rgba(255,255,255,.05);border:1.5px solid var(--border-l);
  border-radius:9px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:7px 14px;border:1.5px solid var(--border-l);
  background:rgba(255,255,255,.05);border-radius:8px;color:var(--muted);
  cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.filter-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
.filter-btn.active{background:rgba(99,102,241,.2);border-color:var(--accent);color:var(--accent2);}

/* ── SECTION HEADER ─────────────────────── */
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--muted);}
.section-count{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:rgba(99,102,241,.15);color:var(--accent2);border:1px solid rgba(99,102,241,.3);}

/* ── COUNTDOWN CARDS ────────────────────── */
.cd-list{display:flex;flex-direction:column;gap:10px;}

.cd-card{background:var(--card);border:1.5px solid var(--border);border-radius:13px;
  padding:16px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  transition:border-color .2s;}
.cd-card:hover{border-color:var(--border-l);}

.cd-card.warning{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.05);}
.cd-card.critical{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07);
  animation:pulse 2s ease-in-out infinite;}
.cd-card.expired{border-color:rgba(239,68,68,.9);background:rgba(239,68,68,.09);
  animation:blink-expired .7s ease-in-out infinite;}
@keyframes blink-expired{0%,100%{opacity:1;border-color:rgba(239,68,68,.9);}50%{opacity:.3;border-color:rgba(239,68,68,.15);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.75;}}

/* Table number */
.cd-table{font-size:22px;font-weight:800;color:var(--text);
  min-width:52px;text-align:center;flex-shrink:0;}

/* Stations */
.cd-stations{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:120px;}
.station-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border-l);}

/* Time */
.cd-time{font-size:26px;font-weight:800;min-width:72px;text-align:right;flex-shrink:0;
  font-variant-numeric:tabular-nums;}
.cd-time.neutral{color:var(--ok);}
.cd-time.warning{color:var(--warn);}
.cd-time.critical{color:var(--danger);}

/* Meta */
.cd-meta{display:flex;flex-direction:column;gap:3px;min-width:90px;flex-shrink:0;}
.cd-meta-row{font-size:11px;color:var(--muted);}
.cd-meta-row strong{color:var(--text);font-weight:600;}

/* Status badge */
.status-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;}
.status-badge.active{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.25);}
.status-badge.alert{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25);}

/* Empty state */
.empty-state{text-align:center;padding:70px 20px;color:var(--muted);}
.empty-state-icon{font-size:56px;margin-bottom:16px;}
.empty-state-text{font-size:16px;}

/* ── MOBILE ─────────────────────────────── */
@media(max-width:600px){
  .cd-card{gap:10px;}
  .cd-meta{display:none;}
  .cd-time{font-size:22px;}
  .hdr-brand{max-width:120px;}
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────── -->
<header class="hdr">
  <span id="hdr-company" class="hdr-brand">Servizio</span>
  <span class="hdr-sep"></span>
  <span class="hdr-page">Servizio</span>
  <span id="connectionStatus" class="conn-badge">🔴 Riconnessione…</span>
  <button class="hdr-btn" onclick="window.location.href='home.html'">Home</button>
  <button class="hdr-btn danger" onclick="window.location.href='index.html'">Esci</button>
</header>

<!-- ── MAIN ───────────────────────────── -->
<main class="main">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Countdown Attivi</div>
      <div class="stat-value" id="activeCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tempo Medio Attesa</div>
      <div class="stat-value" id="avgTime">0:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tavoli in Attesa</div>
      <div class="stat-value" id="tableCount">0</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cerca tavolo…">
    <div class="filter-group" id="filter-group">
      <button class="filter-btn active" data-filter="all">Tutti</button>
    </div>
  </div>

  <!-- List -->
  <div class="section-hdr">
    <span class="section-title">Countdown attivi</span>
    <span class="section-count" id="visibleCount">0</span>
  </div>
  <div class="cd-list" id="countdownsList"></div>

</main>

<audio id="snd-warn"   src="alerte-346112.mp3"           preload="auto"></audio>
<audio id="snd-expiry" src="costa-rica-eas-alarm-346194.mp3" preload="auto"></audio>

<script src="js/ws-auth.js"></script>
<script src="js/countdowns.js"></script>
<script src="company-header.js"></script>
<script>
    let countdowns = [];
    let activeFilter = 'all';
    let searchTerm = '';
    let subscription = null;
    let updateInterval = null;

    // ── Alarm audio ─────────────────────────────────────────────────────────
    let _audioUnlocked = false;
    function _unlockAudio() {
        if (_audioUnlocked) return;
        _audioUnlocked = true;
        ['snd-warn','snd-expiry'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.muted = true;
            el.play().then(() => { el.pause(); el.muted = false; el.currentTime = 0; }).catch(() => {});
        });
    }
    ['pointerdown','keydown'].forEach(ev =>
        document.addEventListener(ev, _unlockAudio, { once: true })
    );
    function playAlarm(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.currentTime = 0;
        el.play().catch(err => console.warn('[alarm] play blocked:', err.message));
    }

    let companyName = localStorage.getItem('userCompany');
    if (!companyName) {
        alert('❌ Nome azienda non trovato. Effettua il login.');
        window.location.href = 'index.html';
    }
    companyName = companyName.trim().toLowerCase();

    // Populate header company name (display only)
    document.getElementById('hdr-company').textContent = localStorage.getItem('userCompany') || 'Servizio';

    // Map of deptId → department object (name, active)
    let departmentMap = {};

    async function loadDepartments() {
        const token = WsAuth.getStoredToken();
        if (!token) return;
        try {
            const res = await fetch('/api/departments', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success && data.departments) {
                departmentMap = {};
                data.departments.forEach(d => { departmentMap[d.id] = d; });
                buildFilterButtons(data.departments.filter(d => d.active));
            }
        } catch (e) { console.warn('Could not load departments for sala:', e.message); }
    }

    function buildFilterButtons(activeDepts) {
        const group = document.getElementById('filter-group');
        if (!group) return;
        // Remove old dept buttons (keep "Tutti")
        Array.from(group.querySelectorAll('[data-dept]')).forEach(el => el.remove());
        activeDepts.forEach(d => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.filter = d.id;
            btn.dataset.dept = '1';
            btn.textContent = d.name;
            btn.addEventListener('click', () => {
                group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = d.id;
                renderCountdowns();
            });
            group.appendChild(btn);
        });
    }

    function initializePage() {
        loadDepartments();
        loadInitialCountdowns();
        subscribeToUpdates();
        startAutoRefresh();
        setupEventListeners();
    }

    function loadInitialCountdowns() {
        CountdownsModule.fetchActiveCountdowns(companyName)
            .then(data => {
                // Initialize alarm flags — suppress alarms for countdowns that are already
                // past their threshold so reconnects / page loads don't replay old alarms.
                countdowns = data.map(cd => {
                    const tr = cd.remainingTime != null ? cd.remainingTime : (cd.timeRemaining || 0);
                    return {
                        ...cd,
                        remainingTime:  tr,
                        startTime:      cd.startTime || Date.now(),
                        warnedAt60:     tr <= 60,
                        alarmedExpiry:  tr === 0,
                        expiredAt:      tr === 0 ? Date.now() : null
                    };
                });
                renderCountdowns();
                updateStatistics();
            })
            .catch(error => {
                console.error('Error loading countdowns:', error);
            });
    }

    function subscribeToUpdates() {
        subscription = CountdownsModule.subscribeCountdowns({
            companyName: companyName,
            onCountdownUpdate: (data) => {
                updateCountdown(data);
            },
            onCountdownDelete: (tableNumber) => {
                deleteCountdown(tableNumber);
            },
            onConnectionStatus: (connected) => {
                updateConnectionStatus(connected);
            }
        });
    }

    function startAutoRefresh() {
        updateInterval = setInterval(() => {
            updateAllCountdowns();
        }, 1000);
    }

    function updateAllCountdowns() {
        const now = Date.now();

        countdowns = countdowns.reduce((acc, cd) => {
            // ── Expired phase: blink for 15 s then drop ──────────────────────
            if (cd.expiredAt !== null) {
                if (now - cd.expiredAt >= 15000) return acc; // drop after 15 s
                acc.push({ ...cd, remainingTime: 0, remainingTimeFormatted: '0:00' });
                return acc;
            }

            const prevRem = cd.remainingTime;
            const elapsed = Math.floor((now - cd.startTime) / 1000);
            const rem     = Math.max(0, cd.initialDuration - elapsed);

            // ── 60-second warning (handles skipped ticks) ────────────────────
            if (!cd.warnedAt60 && prevRem > 60 && rem <= 60) {
                playAlarm('snd-warn');
                cd.warnedAt60 = true;
            }

            if (rem === 0) {
                // Transition to expired phase
                if (!cd.alarmedExpiry) {
                    playAlarm('snd-expiry');
                    cd.alarmedExpiry = true;
                }
                acc.push({
                    ...cd,
                    remainingTime: 0,
                    remainingTimeFormatted: '0:00',
                    expiredAt: cd.expiredAt !== null ? cd.expiredAt : now,
                    alarmedExpiry: true,
                    warnedAt60: true
                });
                return acc;
            }

            acc.push({
                ...cd,
                remainingTime: rem,
                remainingTimeFormatted: CountdownsModule.formatTime(rem)
            });
            return acc;
        }, []);

        renderCountdowns();
        updateStatistics();
    }

    function updateCountdown(data) {
        const tr = data.timeRemaining;
        const existingIndex = countdowns.findIndex(c => c.tableNumber == data.tableNumber);

        if (existingIndex !== -1) {
            const existing = countdowns[existingIndex];

            if (data.destination && !existing.destinations.includes(data.destination)) {
                existing.destinations.push(data.destination);
            }

            // If time was extended (new start), reset alarm flags
            if (tr > 0 && tr > existing.remainingTime) {
                existing.warnedAt60    = tr <= 60;
                existing.alarmedExpiry = false;
                existing.expiredAt     = null;
            }

            existing.remainingTime          = tr;
            existing.initialDuration        = tr;
            existing.startTime              = Date.now();
            existing.remainingTimeFormatted = CountdownsModule.formatTime(tr);
        } else {
            // New arrival — suppress alarms that already passed (reconnect / mid-countdown join)
            countdowns.push({
                tableNumber:            data.tableNumber,
                remainingTime:          tr,
                initialDuration:        tr,
                destinations:           data.destination ? [data.destination] : [],
                startedAt:              new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }),
                startTime:              Date.now(),
                status:                 'active',
                remainingTimeFormatted: CountdownsModule.formatTime(tr),
                warnedAt60:             tr <= 60,
                alarmedExpiry:          tr === 0,
                expiredAt:              tr === 0 ? Date.now() : null
            });
        }

        renderCountdowns();
        updateStatistics();
    }

    function deleteCountdown(tableNumber) {
        countdowns = countdowns.filter(c => c.tableNumber != tableNumber);
        renderCountdowns();
        updateStatistics();
    }

    function renderCountdowns() {
        const container = document.getElementById('countdownsList');
        
        let filtered = countdowns.filter(c => {
            const matchesSearch = searchTerm === '' || 
                c.tableNumber.toString().includes(searchTerm);
            
            const matchesFilter = activeFilter === 'all' || 
                (c.destinations && c.destinations.includes(activeFilter));
            
            return matchesSearch && matchesFilter;
        });

        filtered.sort((a, b) => a.remainingTime - b.remainingTime);

        const visibleCount = document.getElementById('visibleCount');
        if (visibleCount) visibleCount.textContent = filtered.length;

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🍽️</div>
                    <div class="empty-state-text">Nessun countdown attivo</div>
                </div>
            `;
            return;
        }

        container.innerHTML = filtered.map(countdown => {
            const isExpired   = countdown.expiredAt !== null;
            const alertLevel  = isExpired
                ? 'expired'
                : CountdownsModule.getAlertLevel(countdown.remainingTime);
            const statusClass = isExpired ? 'alert' : countdown.remainingTime < 120 ? 'alert' : 'active';
            const initialTimeFormatted = CountdownsModule.formatTime(countdown.initialDuration);

            const stationBadges = countdown.destinations && countdown.destinations.length > 0
                ? countdown.destinations.map(dest =>
                    `<span class="station-badge">${getStationIcon(dest)}</span>`
                  ).join('')
                : '<span class="station-badge">🍳 Cucina</span>';

            return `
                <div class="cd-card ${alertLevel}">
                    <div class="cd-table">T${countdown.tableNumber}</div>
                    <div class="cd-stations">${stationBadges}</div>
                    <div class="cd-meta">
                        <div class="cd-meta-row">Inizio: <strong>${countdown.startedAt}</strong></div>
                        <div class="cd-meta-row">Durata: <strong>${initialTimeFormatted}</strong></div>
                    </div>
                    <div class="cd-time ${alertLevel}">${countdown.remainingTimeFormatted}</div>
                    <span class="status-badge ${statusClass}">
                        ${isExpired ? '⏰ Scaduto' : statusClass === 'alert' ? '🔥 Urgente' : '✅ Attivo'}
                    </span>
                </div>
            `;
        }).join('');
    }

    function getStationIcon(station) {
        // Look up department name from map; fall back to raw ID
        if (departmentMap[station]) return departmentMap[station].name;
        // Legacy names for old countdown records
        const legacy = { 'cucina': '🍳 Cucina', 'pizzeria': '🍕 Pizzeria', 'insalata': '🥗 Insalata' };
        return legacy[station] || station;
    }

    function updateStatistics() {
        document.getElementById('activeCount').textContent = countdowns.length;
        
        const uniqueTables = new Set(countdowns.map(c => c.tableNumber)).size;
        document.getElementById('tableCount').textContent = uniqueTables;

        const avgTime = CountdownsModule.calculateAverageWaitTime(countdowns);
        document.getElementById('avgTime').textContent = CountdownsModule.formatTime(avgTime);
    }

    function updateConnectionStatus(connected) {
        const statusEl = document.getElementById('connectionStatus');
        if (connected) {
            statusEl.className = 'conn-badge ok';
            statusEl.innerHTML = '🟢 Connesso';
        } else {
            statusEl.className = 'conn-badge';
            statusEl.innerHTML = '🔴 Riconnessione…';
        }
    }

    function setupEventListeners() {
        const searchInput = document.getElementById('searchInput');
        let debounceTimer;
        
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                searchTerm = e.target.value.toLowerCase();
                renderCountdowns();
            }, 150);
        });

        // "Tutti" button — department buttons are wired inside buildFilterButtons
        const tuttiBtn = document.querySelector('.filter-btn[data-filter="all"]');
        if (tuttiBtn) {
            tuttiBtn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                tuttiBtn.classList.add('active');
                activeFilter = 'all';
                renderCountdowns();
            });
        }
    }

    window.addEventListener('load', initializePage);

    window.addEventListener('beforeunload', () => {
        if (subscription) {
            subscription.disconnect();
        }
        if (updateInterval) {
            clearInterval(updateInterval);
        }
    });
</script>
</body>
</html>
